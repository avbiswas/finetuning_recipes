# Tiny end-to-end check: model load, rollout, reward, gradient update, eval, save.
model:
  name: "models/merged/neuraltxt-135M-reasoning-base-v2"
  from_sft: false
  max_new_tokens: 16

training:
  rollout_batch_size: 1
  n_rollouts: 2
  temperature: 0.7
  batch_size: 2
  gradient_accumulation_steps: 1
  learning_rate: 0.000001
  num_epochs: 1
  log_every: 1
  top_p: 0.95
  num_repeats: 1
  buffer_size: 2
  eval_every_train_step: 1   # tiny run never reaches event 8; eval+save every event so the smoke exercises them

data:
  dataset: "data/paper_instructions_300K-v2"
  train_split: "train"
  test_split: "test"
  train_data_size: 5
  eval_data_size: 1
  test_batch_size: 1

loss:
  kld_weight: 0.02
  entropy_weight: 0.01
